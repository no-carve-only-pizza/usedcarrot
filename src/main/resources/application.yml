spring:
  application:
    name: usedcarrot
  datasource:
    url: jdbc:h2:file:./data/usedcarrot;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: strict
  error:
    include-message: never
    include-stacktrace: never

usedcarrot:
  upload-dir: ./uploads
  bootstrap-admin:
    email: ${USEDCARROT_ADMIN_EMAIL:}
    password: ${USEDCARROT_ADMIN_PASSWORD:}
  trusted-proxies: ${USEDCARROT_TRUSTED_PROXIES:}
  login-rate-limit:
    max-failures: 10
    window-seconds: 60

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.security: info
