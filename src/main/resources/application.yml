spring:
  application:
    name: usedcarrot-web3
  datasource:
    url: jdbc:h2:file:./data/usedcarrot-web3;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8081}
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: strict
  error:
    include-message: never
    include-stacktrace: never

usedcarrot:
  upload-dir: ./uploads
  bootstrap-admin:
    email: ${USEDCARROT_ADMIN_EMAIL:}
    password: ${USEDCARROT_ADMIN_PASSWORD:}
  trusted-proxies: ${USEDCARROT_TRUSTED_PROXIES:}
  login-rate-limit:
    max-failures: 30
    window-seconds: 60
  ethereum:
    chain-id: ${USEDCARROT_ETH_CHAIN_ID:11155111}
    chain-name: ${USEDCARROT_ETH_CHAIN_NAME:Sepolia}
    rpc-url: ${USEDCARROT_ETH_RPC_URL:https://ethereum-sepolia-rpc.publicnode.com}
    explorer-tx-url: ${USEDCARROT_ETH_EXPLORER_TX:https://sepolia.etherscan.io/tx/}
    currency-symbol: ETH
    required-confirmations: ${USEDCARROT_ETH_CONFIRMATIONS:3}

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.security: info
