<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="siteHead">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UsedCarrot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar" th:fragment="siteHeader">
    <a class="brand" th:href="@{/}">UsedCarrot</a>
    <form class="search" th:action="@{/products}" method="get">
        <input name="keyword" maxlength="50" placeholder="상품 검색">
        <button type="submit">검색</button>
    </form>
    <nav>
        <a th:href="@{/products}">상품</a>
        <a sec:authorize="isAnonymous()" th:href="@{/login}">로그인</a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}">회원가입</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/products/new}">상품 등록</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/chat}">채팅</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/wallet}">지갑</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/users/me}">마이페이지</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">관리자</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="inline">
            <button type="submit">로그아웃</button>
        </form>
    </nav>
</header>
<main class="container" th:fragment="content">
</main>
</body>
</html>
