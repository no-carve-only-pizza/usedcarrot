<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="siteHead">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UsedCarrot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar" th:fragment="siteHeader">
    <div class="topbar-inner">
        <a class="brand" th:href="@{/}">Used<span>Carrot</span></a>
        <form class="search" th:action="@{/products}" method="get">
            <input name="keyword" maxlength="50" placeholder="상품명, 지역으로 검색" aria-label="상품 검색">
            <button type="submit" class="search-btn">검색</button>
        </form>
        <nav class="nav">
            <a class="nav-link" th:href="@{/products}">상품</a>
            <a class="nav-link" sec:authorize="isAnonymous()" th:href="@{/login}">로그인</a>
            <a class="nav-cta" sec:authorize="isAnonymous()" th:href="@{/register}">회원가입</a>
            <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/products/me}">내 상품</a>
            <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/favorites}">관심</a>
            <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/chat}">채팅</a>
            <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/wallet}">결제</a>
            <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/users/me}">마이</a>
            <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">관리자</a>
            <a class="nav-cta" sec:authorize="isAuthenticated()" th:href="@{/products/new}">상품 등록</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="nav-logout">로그아웃</button>
            </form>
        </nav>
    </div>
</header>
<main class="container" th:fragment="content">
</main>
</body>
</html>
