<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>로그인</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<main class="auth">
    <h1>로그인</h1>
    <p class="notice" th:if="${param.error}">이메일 또는 비밀번호가 올바르지 않습니다.</p>
    <p class="notice" th:if="${message}" th:text="${message}"></p>
    <form th:action="@{/login}" method="post">
        <label>이메일 <input type="email" name="email" required maxlength="100"></label>
        <label>비밀번호 <input type="password" name="password" required></label>
        <button type="submit">로그인</button>
    </form>
    <p><a th:href="@{/register}">회원가입</a> · <a th:href="@{/}">홈</a></p>
</main>
</body>
</html>
