<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>상품 관리</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><main class="container"><h1>상품 관리</h1><table><tr><th>ID</th><th>제목</th><th>판매자</th><th>신고</th><th>상태</th><th>변경</th></tr><tr th:each="product : ${products}"><td th:text="${product.id}"></td><td th:text="${product.title}"></td><td th:text="${product.seller.nickname}"></td><td th:text="${product.reportCount}"></td><td th:text="${product.status}"></td><td><form th:action="@{/admin/products/{id}/status(id=${product.id})}" method="post"><select name="status"><option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option></select><button>저장</button></form></td></tr></table></main></body>
</html>
