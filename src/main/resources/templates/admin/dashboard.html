<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>관리자</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<header th:replace="~{layout :: siteHeader}"></header>
<main class="container">
    <section class="page-title">
        <p class="eyebrow">Admin</p>
        <h1>관리자 대시보드</h1>
        <p>사용자, 상품, 신고, 지갑 거래, 감사 로그를 관리합니다.</p>
    </section>
    <nav class="quick-links">
        <a class="button secondary" th:href="@{/admin/users}">사용자</a>
        <a class="button secondary" th:href="@{/admin/products}">상품</a>
        <a class="button secondary" th:href="@{/admin/reports}">신고</a>
        <a class="button secondary" th:href="@{/admin/wallet-transactions}">지갑 거래</a>
        <a class="button secondary" th:href="@{/admin/audit-logs}">감사 로그</a>
    </nav>
    <dl class="info-grid">
        <div><dt>사용자</dt><dd th:text="|${userCount} (활성 ${activeUserCount})|"></dd></div>
        <div><dt>상품</dt><dd th:text="|${productCount} (숨김 ${hiddenProductCount})|"></dd></div>
        <div><dt>미처리 신고</dt><dd th:text="${pendingReportCount}"></dd></div>
    </dl>
</main>
</body>
</html>
