<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>사용자 관리</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<header th:replace="~{layout :: siteHeader}"></header>
<main class="container">
    <a class="back-link" th:href="@{/admin}">관리자 홈</a>
    <h1>사용자 관리</h1>
    <p class="empty">결제는 Sepolia ETH 온체인만 사용합니다.</p>
    <table>
        <tr><th>ID</th><th>이메일</th><th>닉네임</th><th>지갑</th><th>상태</th><th>상태 변경</th></tr>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.nickname}"></td>
            <td th:text="${user.walletAddress != null ? user.walletAddress : '-'}"></td>
            <td th:text="${user.status}"></td>
            <td>
                <form th:action="@{/admin/users/{id}/status(id=${user.id})}" method="post">
                    <select name="status"><option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option></select>
                    <button>저장</button>
                </form>
            </td>
        </tr>
    </table>
</main>
</body>
</html>
