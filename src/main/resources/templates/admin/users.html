<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>사용자 관리</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><main class="container"><h1>사용자 관리</h1><table><tr><th>ID</th><th>이메일</th><th>닉네임</th><th>상태</th><th>변경</th></tr><tr th:each="user : ${users}"><td th:text="${user.id}"></td><td th:text="${user.email}"></td><td th:text="${user.nickname}"></td><td th:text="${user.status}"></td><td><form th:action="@{/admin/users/{id}/status(id=${user.id})}" method="post"><select name="status"><option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option></select><button>저장</button></form></td></tr></table></main></body>
</html>
